<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Editor Pro</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="theme-dark">

  <!-- Background blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app-shell">

    <!-- Header -->
    <header class="app-header glass">
      <div class="header-left">
        <div class="logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" fill="url(#cookieGrad)" />
            <circle cx="8" cy="9" r="1.5" fill="rgba(255,255,255,0.9)" />
            <circle cx="14" cy="7" r="1" fill="rgba(255,255,255,0.9)" />
            <circle cx="16" cy="14" r="1.5" fill="rgba(255,255,255,0.9)" />
            <circle cx="9" cy="15" r="1" fill="rgba(255,255,255,0.9)" />
            <circle cx="13" cy="12" r="1" fill="rgba(255,255,255,0.7)" />
            <defs>
              <linearGradient id="cookieGrad" x1="0" y1="0" x2="24" y2="24">
                <stop offset="0%" stop-color="#f9a825"/>
                <stop offset="100%" stop-color="#e65100"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="header-title">
          <span class="title-main">Cookie Editor</span>
          <span class="title-pro">PRO</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-theme" title="Toggle theme">
          <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon icon-sun hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="icon-btn" id="btn-refresh" title="Refresh cookies">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
      </div>
    </header>

    <!-- Domain bar -->
    <div class="domain-bar glass">
      <svg class="icon domain-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span class="domain-text" id="domain-text">Loading...</span>
      <span class="cookie-count-badge" id="cookie-count">0</span>
    </div>

    <!-- Toolbar -->
    <div class="toolbar glass">
      <div class="search-wrap">
        <svg class="icon search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search cookies..." />
        <button class="icon-btn clear-search hidden" id="btn-clear-search" title="Clear search">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="toolbar-right">
        <button class="icon-btn" id="btn-add" title="Add new cookie">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="icon-btn" id="btn-import" title="Import cookies">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <button class="icon-btn" id="btn-export" title="Export cookies">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="icon-btn danger-btn" id="btn-delete-all" title="Delete all cookies">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>

    <!-- Bulk actions bar (shown when items selected) -->
    <div class="bulk-bar glass hidden" id="bulk-bar">
      <label class="checkbox-wrap">
        <input type="checkbox" id="select-all-cb" />
        <span class="checkmark"></span>
      </label>
      <span class="bulk-text" id="bulk-text">0 selected</span>
      <div class="bulk-actions">
        <button class="pill-btn" id="btn-bulk-export">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
        <button class="pill-btn danger" id="btn-bulk-delete">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          Delete
        </button>
      </div>
    </div>

    <!-- Cookie list -->
    <main class="cookie-list" id="cookie-list">
      <div class="empty-state" id="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
        <p>No cookies found</p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer glass">
      <div class="footer-left">
        <span class="footer-text" id="footer-status">Ready</span>
        <span class="footer-divider">·</span>
        <span class="footer-credit">by Junyu</span>
        <a class="footer-github" href="https://github.com/jjtjtyt6644/Cookie-Editor-Extension" target="_blank" title="View on GitHub">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
        </a>
      </div>
      <label class="checkbox-wrap small" id="select-all-wrap">
        <input type="checkbox" id="select-all-footer" />
        <span class="checkmark"></span>
        <span class="footer-text">Select all</span>
      </label>
    </footer>
  </div>

  <!-- ===================== EDIT PANEL (slide-in) ===================== -->
  <div class="panel-overlay hidden" id="panel-overlay"></div>
  <div class="edit-panel glass hidden" id="edit-panel">
    <div class="panel-header">
      <h2 class="panel-title" id="panel-title">New Cookie</h2>
      <button class="icon-btn" id="btn-panel-close">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="panel-body">
      <div class="field-group">
        <label class="field-label">Name</label>
        <input type="text" id="edit-name" class="field-input" placeholder="cookie_name" />
      </div>
      <div class="field-group">
        <label class="field-label">Value</label>
        <textarea id="edit-value" class="field-input field-textarea" placeholder="cookie_value" rows="3"></textarea>
      </div>
      <div class="field-row">
        <div class="field-group flex-1">
          <label class="field-label">Domain</label>
          <input type="text" id="edit-domain" class="field-input" placeholder=".example.com" />
        </div>
        <div class="field-group flex-1">
          <label class="field-label">Path</label>
          <input type="text" id="edit-path" class="field-input" placeholder="/" />
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Expires</label>
        <input type="datetime-local" id="edit-expires" class="field-input" />
        <label class="inline-check">
          <input type="checkbox" id="edit-session" />
          <span class="checkmark"></span>
          <span>Session cookie (no expiry)</span>
        </label>
      </div>

      <div class="flags-grid">
        <label class="flag-toggle">
          <input type="checkbox" id="edit-secure" />
          <div class="flag-card">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span class="flag-name">Secure</span>
            <span class="flag-desc">HTTPS only</span>
          </div>
        </label>
        <label class="flag-toggle">
          <input type="checkbox" id="edit-httponly" />
          <div class="flag-card">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span class="flag-name">HttpOnly</span>
            <span class="flag-desc">No JS access</span>
          </div>
        </label>
        <label class="flag-toggle">
          <input type="checkbox" id="edit-hostonly" />
          <div class="flag-card">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            <span class="flag-name">HostOnly</span>
            <span class="flag-desc">Exact host</span>
          </div>
        </label>
      </div>

      <div class="field-group">
        <label class="field-label">SameSite</label>
        <select id="edit-samesite" class="field-input field-select">
          <option value="no_restriction">No restriction</option>
          <option value="lax">Lax</option>
          <option value="strict">Strict</option>
          <option value="unspecified">Unspecified</option>
        </select>
      </div>

      <div class="panel-actions">
        <button class="btn-secondary" id="btn-panel-cancel">Cancel</button>
        <button class="btn-primary" id="btn-panel-save">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
          Save Cookie
        </button>
      </div>
    </div>
  </div>

  <!-- ===================== IMPORT PANEL ===================== -->
  <div class="edit-panel glass hidden" id="import-panel">
    <div class="panel-header">
      <h2 class="panel-title">Import Cookies</h2>
      <button class="icon-btn" id="btn-import-close">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="panel-body">
      <div class="format-tabs">
        <button class="format-tab active" data-fmt="json">JSON</button>
        <button class="format-tab" data-fmt="header">Header</button>
        <button class="format-tab" data-fmt="netscape">Netscape</button>
      </div>
      <div class="field-group">
        <label class="field-label">Paste cookie data</label>
        <textarea id="import-data" class="field-input field-textarea mono" placeholder='[{"name":"session","value":"abc123",...}]' rows="8"></textarea>
      </div>
      <div class="import-options">
        <label class="inline-check">
          <input type="checkbox" id="import-overwrite" checked />
          <span class="checkmark"></span>
          <span>Overwrite existing cookies</span>
        </label>
      </div>
      <div class="panel-actions">
        <button class="btn-secondary" id="btn-import-cancel">Cancel</button>
        <button class="btn-primary" id="btn-import-confirm">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Import
        </button>
      </div>
    </div>
  </div>

  <!-- ===================== EXPORT PANEL ===================== -->
  <div class="edit-panel glass hidden" id="export-panel">
    <div class="panel-header">
      <h2 class="panel-title">Export Cookies</h2>
      <button class="icon-btn" id="btn-export-close">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="panel-body">
      <div class="format-tabs">
        <button class="format-tab active" data-fmt="json">JSON</button>
        <button class="format-tab" data-fmt="header">Header</button>
        <button class="format-tab" data-fmt="netscape">Netscape</button>
      </div>
      <div class="field-group">
        <label class="field-label">Cookie data</label>
        <textarea id="export-data" class="field-input field-textarea mono" rows="8" readonly></textarea>
      </div>
      <div class="panel-actions">
        <button class="btn-secondary" id="btn-export-cancel">Cancel</button>
        <button class="btn-primary" id="btn-copy-export">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy to Clipboard
        </button>
      </div>
    </div>
  </div>

  <!-- ===================== TOAST ===================== -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ===================== CONFIRM DIALOG ===================== -->
  <div class="confirm-overlay hidden" id="confirm-overlay">
    <div class="confirm-dialog glass">
      <div class="confirm-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <p class="confirm-text" id="confirm-text">Are you sure?</p>
      <div class="confirm-actions">
        <button class="btn-secondary" id="btn-confirm-no">Cancel</button>
        <button class="btn-danger" id="btn-confirm-yes">Delete</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
